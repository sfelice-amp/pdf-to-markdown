<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local PDF/DOCX to Markdown</title>
  <style>
    body { font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f7fb; color: #111827; margin: 0; min-height: 100vh; }
    .page { max-width: 960px; margin: 0 auto; padding: 32px; }
    h1 { margin: 0 0 8px; font-size: 2rem; }
    p.lead { color: #475569; margin-top: 0; }
    .dropzone { border: 2px dashed #94a3b8; border-radius: 18px; background: #fff; padding: 40px; text-align: center; transition: border-color .2s ease, background .2s ease; cursor: pointer; }
    .dropzone.hover { background: #eef2ff; border-color: #6366f1; }
    .dropzone input { display: none; }
    .output { margin-top: 24px; display: grid; gap: 12px; }
    textarea { width: 100%; min-height: 320px; padding: 16px; border-radius: 14px; border: 1px solid #cbd5e1; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace; font-size: 0.95rem; line-height: 1.5; resize: vertical; }
    button { border: none; border-radius: 10px; background: #4f46e5; color: white; padding: 12px 18px; font-size: 1rem; cursor: pointer; transition: background .2s ease; }
    button:disabled { background: #c7d2fe; cursor: not-allowed; }
    .status { color: #334155; font-size: 0.95rem; }
    footer { margin-top: 40px; color: #64748b; font-size: 0.9rem; }
  </style>
</head>
<body>
  <main class="page">
    <h1>Local PDF / DOCX to Markdown</h1>
    <p class="lead">Drag a PDF or DOCX file onto the drop zone, or click to browse. Embedded text is used when available; scanned pages fallback to OCR.</p>

    <label id="dropzone" class="dropzone">
      <input type="file" id="file-input" accept=".pdf,.docx" />
      <strong>Drop a PDF or DOCX here</strong>
      <div class="status">or click to select a file.</div>
    </label>

    <div class="output">
      <button id="download-button" disabled>Download Markdown</button>
      <textarea id="markdown-output" placeholder="Converted markdown will appear here..." readonly></textarea>
      <div id="message" class="status"></div>
    </div>
  </main>
  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('file-input');
    const output = document.getElementById('markdown-output');
    const message = document.getElementById('message');
    const downloadButton = document.getElementById('download-button');
    let currentFilename = 'output.md';

    function setStatus(text) {
      message.textContent = text;
    }

    function setDownloading(enabled) {
      downloadButton.disabled = !enabled;
    }

    async function convertFile(file) {
      const formData = new FormData();
      formData.append('file', file);
      setStatus('Converting... please wait.');
      setDownloading(false);

      try {
        const response = await fetch('/convert', {
          method: 'POST',
          body: formData,
        });

        const body = await response.json();
        if (!response.ok) {
          throw new Error(body.error || 'Conversion failed.');
        }

        output.value = body.text;
        currentFilename = body.filename;
        setDownloading(true);
        setStatus('Conversion complete. Review the markdown and download it if you like.');
      } catch (error) {
        output.value = '';
        setStatus(error.message);
      }
    }

    function downloadMarkdown() {
      const blob = new Blob([output.value], { type: 'text/markdown;charset=utf-8' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = currentFilename;
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    dropzone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (file) convertFile(file);
    });

    dropzone.addEventListener('dragover', event => {
      event.preventDefault();
      dropzone.classList.add('hover');
    });

    dropzone.addEventListener('dragleave', () => {
      dropzone.classList.remove('hover');
    });

    dropzone.addEventListener('drop', event => {
      event.preventDefault();
      dropzone.classList.remove('hover');
      const file = event.dataTransfer.files[0];
      if (file) {
        fileInput.files = event.dataTransfer.files;
        convertFile(file);
      }
    });

    downloadButton.addEventListener('click', downloadMarkdown);
  </script>
</body>
</html>
