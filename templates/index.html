<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local PDF/DOCX to Markdown</title>
  <style>
    :root {
      color-scheme: light;
    }

    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #edf2fb 100%);
      color: #0f172a;
      margin: 0;
      min-height: 100vh;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px 48px;
    }

    .hero {
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(2rem, 3vw, 2.6rem);
      line-height: 1.05;
    }

    p.lead {
      color: #334155;
      margin-top: 0;
      max-width: 760px;
    }

    .dropzone {
      border: 2px dashed #7c92b5;
      border-radius: 24px;
      background: #ffffff;
      padding: 42px 30px;
      text-align: center;
      transition: border-color .2s ease, background .2s ease, transform .2s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
      min-height: 220px;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
    }

    .dropzone:hover,
    .dropzone.hover {
      background: #eef4ff;
      border-color: #4f46e5;
      transform: translateY(-1px);
    }

    .dropzone.loading {
      opacity: 0.85;
      cursor: wait;
    }

    .dropzone strong {
      font-size: 1.05rem;
    }

    .dropzone input {
      display: none;
    }

    .file-info {
      margin-top: 8px;
      font-size: 0.9rem;
      color: #475569;
    }

    .file-info.error {
      color: #dc2626;
    }

    .output {
      margin-top: 26px;
      display: grid;
      gap: 16px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .conversion-method {
      color: #475569;
      font-size: 0.95rem;
      margin-left: auto;
    }

    .conversion-method.warning {
      color: #d97706;
      font-weight: 500;
    }

    .loading-indicator {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #475569;
      font-size: 0.95rem;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(79, 70, 229, 0.25);
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    textarea {
      width: 100%;
      min-height: 360px;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace;
      font-size: 0.96rem;
      line-height: 1.6;
      resize: vertical;
      box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.06);
    }

    #preview-output {
      width: 100%;
      min-height: 360px;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.96rem;
      line-height: 1.6;
      box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.06);
      overflow-wrap: break-word;
    }

    button {
      width: 100%;
      max-width: 260px;
      justify-self: start;
      border: none;
      border-radius: 14px;
      background: #4f46e5;
      color: white;
      padding: 14px 20px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s ease, transform .2s ease;
      box-shadow: 0 12px 30px rgba(79, 70, 229, 0.18);
    }

    button:hover:not(:disabled) {
      background: #4338ca;
      transform: translateY(-1px);
    }

    button:disabled {
      background: #c7d2fe;
      cursor: not-allowed;
      box-shadow: none;
    }

    .status {
      color: #475569;
      font-size: 0.95rem;
    }

    footer {
      margin-top: 36px;
      color: #64748b;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <main class="page">
    <h1>Local PDF / DOCX to Markdown</h1>
    <p class="lead">Drag a PDF or DOCX file onto the drop zone, or click to browse. Embedded text is used when
      available; scanned pages fallback to OCR.</p>

    <label id="dropzone" class="dropzone">
      <input type="file" id="file-input" accept=".pdf,.docx" />
      <strong>Drop a PDF or DOCX here</strong>
      <div class="status">or click to select a file.</div>
      <div id="file-info" class="file-info" hidden></div>
    </label>

    <div class="output">
      <div class="controls">
        <button id="download-button" disabled>Download Markdown</button>
        <button id="copy-button" disabled>Copy Markdown</button>
        <button id="toggle-preview" disabled>Preview</button>
        <span id="conversion-method" class="conversion-method"></span>
        <span id="loading-indicator" class="loading-indicator" aria-live="polite" hidden>
          <span class="spinner"></span>
          Converting...
        </span>
      </div>
      <textarea id="markdown-output" placeholder="Converted markdown will appear here..." readonly></textarea>
      <div id="preview-output" hidden></div>
      <div id="message" class="status"></div>
    </div>
  </main>
  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('file-input');
    const fileInfo = document.getElementById('file-info');
    const output = document.getElementById('markdown-output');
    const message = document.getElementById('message');
    const conversionMethod = document.getElementById('conversion-method');
    const loadingIndicator = document.getElementById('loading-indicator');
    const downloadButton = document.getElementById('download-button');
    const copyButton = document.getElementById('copy-button');
    const togglePreview = document.getElementById('toggle-preview');
    const previewOutput = document.getElementById('preview-output');
    let currentFilename = 'output.md';
    let isPreview = false;

    function setStatus(text) {
      message.textContent = text;
    }

    function setSource(text) {
      conversionMethod.textContent = text ? `Source: ${text}` : '';
      conversionMethod.classList.toggle('warning', text === 'OCR');
    }

    function setLoading(loading) {
      loadingIndicator.hidden = !loading;
      dropzone.classList.toggle('loading', loading);
    }

    function setDownloading(enabled) {
      downloadButton.disabled = !enabled;
      copyButton.disabled = !enabled;
      togglePreview.disabled = !enabled;
    }

    function toggleView() {
      isPreview = !isPreview;
      if (isPreview) {
        previewOutput.innerHTML = marked.parse(output.value);
        output.style.display = 'none';
        previewOutput.style.display = 'block';
        togglePreview.textContent = 'Raw';
      } else {
        output.style.display = 'block';
        previewOutput.style.display = 'none';
        togglePreview.textContent = 'Preview';
      }
    }

    function formatFileSize(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function validateFile(file) {
      if (!file) return null;
      const allowedTypes = ['application/pdf', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'];
      const allowedExtensions = ['.pdf', '.docx'];
      const fileName = file.name.toLowerCase();
      const isValidType = allowedTypes.includes(file.type) || allowedExtensions.some(ext => fileName.endsWith(ext));
      if (!isValidType) {
        return 'Unsupported file type. Please select a PDF or DOCX file.';
      }
      if (file.size > 50 * 1024 * 1024) { // 50MB limit
        return 'File is too large. Please select a file smaller than 50MB.';
      }
      return null;
    }

    function updateFileInfo(file) {
      if (!file) {
        fileInfo.hidden = true;
        fileInfo.textContent = '';
        fileInfo.classList.remove('error');
        return;
      }
      const error = validateFile(file);
      if (error) {
        fileInfo.textContent = error;
        fileInfo.classList.add('error');
        fileInfo.hidden = false;
      } else {
        fileInfo.textContent = `${file.name} (${formatFileSize(file.size)})`;
        fileInfo.classList.remove('error');
        fileInfo.hidden = false;
      }
    }

    async function convertFile(file) {
      const error = validateFile(file);
      if (error) {
        setStatus(error);
        return;
      }

      const formData = new FormData();
      formData.append('file', file);
      setStatus('Converting... please wait.');
      setSource('');
      setDownloading(false);
      setLoading(true);

      try {
        const response = await fetch('/convert', {
          method: 'POST',
          body: formData,
        });

        const body = await response.json();
        if (!response.ok) {
          throw new Error(body.error || 'Conversion failed.');
        }

        output.value = body.text;
        currentFilename = body.filename;
        setDownloading(true);
        setSource(body.source_type || '');
        if (isPreview) {
          previewOutput.innerHTML = marked.parse(output.value);
        }
        if (body.source_type === 'OCR') {
          setStatus('Conversion complete. OCR was used - review output for accuracy and manual cleanup if needed.');
        } else {
          setStatus('Conversion complete. Review the markdown and download it if you like.');
        }
      } catch (error) {
        output.value = '';
        setDownloading(false);
        setSource('');
        setStatus(error.message);
      } finally {
        setLoading(false);
      }
    }

    function downloadMarkdown() {
      const blob = new Blob([output.value], { type: 'text/markdown;charset=utf-8' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = currentFilename;
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    dropzone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      updateFileInfo(file);
      if (file && !validateFile(file)) {
        convertFile(file);
      }
    });

    dropzone.addEventListener('dragover', event => {
      event.preventDefault();
      dropzone.classList.add('hover');
    });

    dropzone.addEventListener('dragleave', () => {
      dropzone.classList.remove('hover');
    });

    dropzone.addEventListener('drop', event => {
      event.preventDefault();
      dropzone.classList.remove('hover');
      const file = event.dataTransfer.files[0];
      if (file) {
        fileInput.files = event.dataTransfer.files;
        updateFileInfo(file);
        if (!validateFile(file)) {
          convertFile(file);
        }
      }
    });

    copyButton.addEventListener('click', () => {
      navigator.clipboard.writeText(output.value).then(() => {
        setStatus('Markdown copied to clipboard.');
      }).catch(() => {
        setStatus('Copy failed. Please try again.');
      });
    });

    downloadButton.addEventListener('click', downloadMarkdown);

    togglePreview.addEventListener('click', toggleView);
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>

</html>
